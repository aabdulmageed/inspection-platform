{{- if .Values.mailpit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ip.fullname" . }}-mailpit
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mailpit
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mailpit
    spec:
      containers:
        - name: mailpit
          image: {{ .Values.mailpit.image | quote }}
          ports:
            - containerPort: 1025   # SMTP
            - containerPort: 8025   # web UI
          readinessProbe:
            tcpSocket:
              port: 1025
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ip.fullname" . }}-mailpit
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: ui
      port: 8025
      targetPort: 8025
{{- end }}
