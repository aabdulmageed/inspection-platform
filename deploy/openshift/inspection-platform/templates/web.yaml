apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ip.fullname" . }}-web
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- if eq .Values.platform "openshift" }}
  annotations:
    {{- include "ip.trigger" (list "web" .) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          # NEXT_PUBLIC_API_URL is baked into the bundle at build time
          # (see the web BuildConfig buildArgs).
          image: {{ include "ip.image" (list "web" .) | quote }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ip.fullname" . }}-web
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
  ports:
    - port: 3000
      targetPort: 3000
