{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ip.fullname" . }}-secrets
  labels:
    {{- include "ip.labels" . | nindent 4 }}
  {{- if .Values.migrations.job }}
  # Become an early hook so the migrate Job (higher weight) can read it.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
stringData:
  # --- Postgres ---
  POSTGRESQL_USER: {{ .Values.postgres.user | quote }}
  POSTGRESQL_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRESQL_DATABASE: {{ .Values.postgres.database | quote }}
  # --- API ---
  {{- if .Values.postgres.managed }}
  DATABASE_URL: {{ required "postgres.externalDatabaseUrl is required when postgres.managed=true" .Values.postgres.externalDatabaseUrl | quote }}
  {{- else }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s?schema=public" .Values.postgres.user .Values.postgres.password (include "ip.fullname" .) .Values.postgres.database | quote }}
  {{- end }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  # --- Queue (managed Redis auth) ---
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- if .Values.smtp.password }}
  # --- Mail (real SMTP provider) ---
  SMTP_PASS: {{ .Values.smtp.password | quote }}
  {{- end }}
  # --- Object storage ---
  S3_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
{{- end }}
