apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ip.fullname" . }}-pdf
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf
  {{- if eq .Values.platform "openshift" }}
  annotations:
    {{- include "ip.trigger" (list "pdf" .) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.pdf.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pdf
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pdf
    spec:
      containers:
        - name: pdf
          image: {{ include "ip.image" (list "pdf" .) | quote }}
          env:
            - name: PDF_PORT
              value: "4100"
          ports:
            - containerPort: 4100
          readinessProbe:
            httpGet:
              path: /health
              port: 4100
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pdf.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ip.fullname" . }}-pdf
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pdf
  ports:
    - port: 4100
      targetPort: 4100
