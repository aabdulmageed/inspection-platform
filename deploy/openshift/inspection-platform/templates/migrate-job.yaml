{{- if .Values.migrations.job }}
# Runs `prisma migrate deploy` once before the app rolls out (pre-install /
# pre-upgrade hook). Required so a multi-replica api doesn't have every pod
# racing to migrate on startup. Needs the api image to already exist (e.g.
# pushed to ACR before `helm upgrade --install`). The Secret/ConfigMap are
# given matching hook annotations (lower weight) so they exist first.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ip.fullname" . }}-migrate
  labels:
    {{- include "ip.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "ip.image" (list "api" .) | quote }}
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: {{ include "ip.fullname" . }}-config
            - secretRef:
                name: {{ include "ip.fullname" . }}-secrets
{{- end }}
